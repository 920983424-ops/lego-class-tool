<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .container { max-width: 1000px; margin: 0 auto; padding-bottom: 40px; }

  }
  .tab {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 10px 10px 0 0;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: #e8ecf0; color: #666; white-space: nowrap;

    margin-right: 3px; flex-shrink: 0;
  }
  .tab:hover { background: #dce0e6; }
  .tab.active { background: #fff; color: #1a1a2e; box-shadow: 0 -2px 6px rgba(0,0,0,0.06); }
  .tab .close {

  }
  .tab .close:hover { color: #ff3b30; background: #fee; }
  .tab-add {

    padding: 8px 14px; border-radius: 10px 10px 0 0;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: transparent; color: #4f8cff; white-space: nowrap;
    border: 2px dashed #ccc; border-bottom: none;
    transition: all 0.15s; flex-shrink: 0;
  }
  .tab-add:hover { background: #eef3ff; border-color: #4f8cff; }

  /* ====== 表头 ====== */

    background: #fff; border-radius: 0 12px 12px 12px; padding: 14px 18px; margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);

  }
  .header label { display: flex; align-items: center; gap: 4px; font-size: 14px; color: #444; }
  .header input, .header select {
    padding: 5px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
  }

  .toolbar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .btn {
    padding: 6px 14px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer;

  .btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .btn-primary { background: #4f8cff; color: #fff; }
  .btn-success { background: #34c759; color: #fff; }
  .btn-danger { background: #ff3b30; color: #fff; }
  .btn-outline { background: #fff; color: #555; border: 1px solid #ccc; }
  .save-indicator { font-size: 12px; margin-left: auto; padding: 3px 10px; border-radius: 10px; white-space: nowrap; }
  .btn-small { padding: 3px 10px; font-size: 12px; }
  .save-indicator.ok { color: #34c759; background: #e8f5e9; }
  .save-indicator.warn { color: #ff9f0a; background: #fff8e1; }

  /* ====== 学生卡片 ====== */
  .card {
    background: #fff; border-radius: 12px; padding: 14px 18px; margin-bottom: 10px;

  .card.mid { border-left-color: #ff9f0a; background: #fffbea; }
  .card.issue { border-left-color: #ff3b30; background: #fff5f5; }

    font-size: 16px; font-weight: 700; min-width: 50px; cursor: pointer;

  .card-top .name:hover { background: #eee; }
  .card-top .del { margin-left: auto; background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 4px 8px; min-width: 32px; }
  .card-top .del:hover { color: #ff3b30; }

  .sec-title { font-size: 12px; font-weight: 700; color: #999; margin: 6px 0 4px; letter-spacing: 0.3px; }

  .chk-group { display: flex; flex-wrap: wrap; gap: 5px; }
  .chk-group label {
    display: flex; align-items: center; gap: 3px; font-size: 13px;

    cursor: pointer; user-select: none; border: 1px solid transparent;

  }
  .star-btn:hover { color: #ffb84d; }

  .tg-yellow { background: #fef3c7; color: #92400e; }
  .tg-red { background: #fee2e2; color: #991b1b; }
  .tg-blue { background: #dbeafe; color: #1e40af; }

    resize: vertical; min-height: 40px; font-size: 13px; font-family: inherit;
    margin-top: 6px; background: #fafbfc;
  }
  textarea:focus { outline: 2px solid #4f8cff; border-color: #4f8cff; }

  /* ====== 语音输入 ====== */
  .mic-btn {
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border: none; border-radius: 50%;
    background: #e8ecf0; color: #555; font-size: 16px; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .mic-btn:hover { background: #dce0e6; }
  .mic-btn.recording {
    background: #ff3b30; color: #fff;
    animation: mic-pulse 0.8s ease-in-out infinite;
    box-shadow: 0 0 0 4px rgba(255,59,48,0.2);
  }
  @keyframes mic-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .mic-btn.recording::after {
    content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
    animation: mic-ring 1.2s ease-out infinite;
    border: 2px solid rgba(255,59,48,0.4);
  }
  @keyframes mic-ring {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .mic-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .note-wrap { display: flex; gap: 6px; align-items: flex-start; margin-top: 6px; }
  .note-wrap textarea { margin-top: 0; flex: 1; }
  .voice-hint {
    font-size: 11px; color: #ff3b30; padding: 2px 0 0 0;
    display: none; transition: all 0.2s;
  }
  .voice-hint.show { display: block; }

  .modal-overlay {

  }

  .modal-box .desc { font-size: 13px; color: #888; margin-bottom: 20px; }
  .modal-box .btn-block {
    display: block; width: 100%; padding: 11px; margin-bottom: 10px;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .modal-box .btn-block:hover { transform: translateY(-1px); }
  .modal-box .btn-google { background: #fff; color: #444; border: 1px solid #ddd; }
  .modal-box .btn-google:hover { background: #f5f5f5; }
  .modal-box .btn-email { background: #4f8cff; color: #fff; }
  .modal-box .btn-email:hover { background: #3d7ae8; }
  .modal-box .divider {
    text-align: center; color: #bbb; font-size: 12px; margin: 14px 0;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-box .divider::before, .modal-box .divider::after {
    content: ''; flex: 1; height: 1px; background: #eee;
  }
  .modal-box input[type="email"], .modal-box input[type="password"] {
    display: block; width: 100%; padding: 10px 12px; margin-bottom: 10px;
    border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
    box-sizing: border-box;
  }
  .modal-box input:focus { outline: 2px solid #4f8cff; border-color: #4f8cff; }
  .modal-box .row { display: flex; gap: 8px; }
  .modal-box .row .btn-block { flex: 1; }
  .modal-box .close-btn {
    float: right; background: none; border: none; font-size: 22px;
    color: #999; cursor: pointer; padding: 0; line-height: 1;
  }
  .modal-box .close-btn:hover { color: #333; }

  .file-input-wrap { display: none; }
  .empty-tip { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; }

  @media print {
    body { background: #fff; padding: 10px; }
    .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }

  }
</style>

// ======== 数据模型 ========
let sessions = [];          // 所有课堂
let currentId = null;       // 当前选中的课堂 ID
let storageOK = true;
let autoSaveTimer = null;
let undoStack = [];         // 撤销栈 {label, type, students, sessionId}
const MAX_UNDO = 20;

function makeSession() {
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0];
  return {
    id: Date.now() + '_' + Math.random().toString(36).slice(2,6),
    meta: { classDate: dateStr, courseTheme: '', courseId: -1, classPeriod: '' },
    customGoals: '',
    students: []
  };
}

function makeStudent(name) {
  return { name, checks:{}, stars:{搭建:0,编程:0,总评:0}, tags:[], note:'', status:'' };
}

// ======== 当前课堂的快捷引用 ========
function curSession() {
  return sessions.find(s => s.id === currentId);
}
function curStudents() {
  const s = curSession();
  return s ? s.students : [];
}

// ======== 撤销 ========
function pushUndo(label) {
  const s = curSession();
  if (!s) return;
  undoStack.push({
    label,
    type: 'students',
    sessionId: s.id,
    students: JSON.parse(JSON.stringify(s.students))
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  const btn = document.getElementById('undoBtn');
  if (btn && undoStack.length > 0) btn.style.display = '';
}

window.undo = function() {
  if (undoStack.length === 0) return;
  const action = undoStack.pop();
  const btn = document.getElementById('undoBtn');
  if (btn && undoStack.length === 0) btn.style.display = 'none';

  if (action.type === 'session') {
    // 恢复被删除的课堂
    sessions.push(action.session);
    currentId = action.session.id;
    renderAll();
    saveData();
  } else {
    // 恢复学生列表
    const s = sessions.find(x => x.id === action.sessionId);
    if (!s) { alert('该课堂已不存在，无法撤销'); return; }
    s.students = action.students;
    if (currentId !== s.id) {
      currentId = s.id;
      renderTabs();
      renderHeader();
      updateGoalsDisplay();
    }
    renderStudents();
    saveData();
    renderTabs();
  }
  // 简短提示
  const el = document.getElementById('saveIndicator');
  el.textContent = '↩ 已撤销：' + action.label;
  el.className = 'save-indicator ok';
  setTimeout(() => { el.textContent = '💾 已保存'; }, 2000);
};

// ======== 保存 / 加载 ========
function saveData() {
  if (!storageOK) return;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({ sessions, currentId }));
    document.getElementById('saveIndicator').className = 'save-indicator ok';
    document.getElementById('saveIndicator').textContent = '💾 已保存';
  } catch(e) {
    storageOK = false;
    const el = document.getElementById('saveIndicator');
    el.className = 'save-indicator warn';
    el.textContent = '⚠️ 不支持自动保存，请用下载备份';
  }
  // 同时上传到云端
  scheduleCloudSave();
}

function scheduleCloudSave() {
  if (!currentUser) return;
  cloudSavePending = true;
  if (cloudTimer) clearTimeout(cloudTimer);
  cloudTimer = setTimeout(uploadToCloud, 2000);
}

async function uploadToCloud() {
  if (!currentUser || !cloudSavePending) return;
  cloudSavePending = false;
  try {
    await db.collection('users').doc(currentUser.uid).set({
      data: JSON.stringify({ sessions, currentId }),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('cloudStatus').textContent = '☁️ 已同步';
  } catch(e) {
    console.warn('☁️ 云端同步失败:', e);
    document.getElementById('cloudStatus').textContent = '⚠️ 同步失败';
  }
}

function debounceSave() {
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveData, 300);
}

function loadFromLocal() {
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data.sessions && data.sessions.length > 0) {
        sessions = data.sessions;
        currentId = data.currentId || sessions[0].id;
        migrateSessions(sessions);
        return true;
      }
    }
  } catch(e) { storageOK = false; }
  return false;
}

function migrateSessions(arr) {
  arr.forEach(s => {
    if (!s.meta) s.meta = { classDate:'', courseTheme:'', courseId:-1, classPeriod:'' };
    if (s.customGoals === undefined) s.customGoals = '';
    if (s.meta.className && !s.meta.courseTheme) {
      let found = false;
      for (const theme of Object.keys(COURSES)) {
        const idx = COURSES[theme].findIndex(c => c.name === s.meta.className);
        if (idx >= 0) { s.meta.courseTheme = theme; s.meta.courseId = idx; found = true; break; }
      }
      if (!found) { s.meta.courseTheme = ''; s.meta.courseId = -1; }
      delete s.meta.className;
    }
    if (!s.students) s.students = [];
    s.students.forEach(st => {
      if (!st.stars) st.stars = {搭建:0,编程:0,总评:0};
      if (!st.tags) st.tags = [];
      if (!st.note) st.note = '';
      if (!st.status) st.status = '';
      if (!st.checks) st.checks = {};
    });
  });
}

function loadData() {
  const localLoaded = loadFromLocal();

  if (!currentUser) {
    // 未登录 → 只用本地数据
    if (!localLoaded) {
      const s = makeSession();
      sessions = [s]; currentId = s.id;
      saveData();
    }
    renderAll();
    return;
  }

  // 已登录 → 尝试从云端加载
  cloudLoaded = false;
  document.getElementById('cloudStatus').textContent = '☁️ 加载中…';
  loadFromCloud();
}

async function loadFromCloud() {
  if (!currentUser) return;
  try {
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if (doc.exists) {
      const raw = doc.data().data;
      if (raw) {
        const data = JSON.parse(raw);
        if (data.sessions && data.sessions.length > 0) {
          sessions = data.sessions;
          currentId = data.currentId || sessions[0].id;
          migrateSessions(sessions);
          // 也存本地做缓存
          try { localStorage.setItem(SAVE_KEY, JSON.stringify({ sessions, currentId })); } catch(e) {}
          document.getElementById('cloudStatus').textContent = '☁️ 已同步';
        }
      }
    }
  } catch(e) {
    console.warn('☁️ 云端加载失败，使用本地数据:', e);
    document.getElementById('cloudStatus').textContent = '⚠️ 离线模式';
  }
  renderAll();
}

// ======== 标签栏渲染 ========
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = sessions.map(s => {
    let courseName = '';
    if (s.meta.courseTheme && s.meta.courseId >= 0) {
      const c = COURSES[s.meta.courseTheme];
      if (c && c[s.meta.courseId]) courseName = c[s.meta.courseId].name;
    }
    const label = escapeHtml(courseName || s.meta.classPeriod || '未命名课堂');
    const date = s.meta.classDate ? escapeHtml(s.meta.classDate.slice(5)) : '';
    const active = s.id === currentId ? 'active' : '';
    const studentCount = s.students.length;
    return `<button class="tab ${active}" onclick="switchSession('${escapeHtml(s.id)}')">
      ${date ? date + ' ' : ''}${label}${studentCount ? ' ('+studentCount+'人)' : ''}
      <span class="close" onclick="event.stopPropagation();deleteSession('${escapeHtml(s.id)}')">✕</span>
    </button>`;
  }).join('');
  bar.innerHTML += `<button class="tab-add" onclick="addSession()">➕ 新课</button>`;
}

// ======== 课堂切换 ========
window.switchSession = function(id) {
  currentId = id;
  renderTabs();
  renderHeader();
  renderStudents();
  updateGoalsDisplay();
};

// ======== 新建课堂 ========
window.addSession = function() {
  const s = makeSession();
  sessions.push(s);
  currentId = s.id;
  renderTabs();
  renderHeader();
  renderStudents();
  updateGoalsDisplay();
  saveData();
};

// ======== 删除课堂 ========
window.deleteSession = function(id) {
  if (sessions.length <= 1) {
    alert('至少保留一个课堂，如果要全部清空请点「清空学生」');
    return;
  }
  const s = sessions.find(x => x.id === id);
  let delLabel = s.meta.classPeriod || '未命名课堂';
  if (s.meta.courseTheme && s.meta.courseId >= 0) {
    const courses = COURSES[s.meta.courseTheme];
    if (courses && courses[s.meta.courseId]) delLabel = courses[s.meta.courseId].name;
  }
  if (!confirm(`确定删除「${delLabel}」及其所有学生数据吗？`)) return;
  // 保存整个 session 用于撤销
  undoStack.push({
    label: '删除课堂「' + delLabel + '」',
    type: 'session',
    session: JSON.parse(JSON.stringify(s)),
    sessionId: id
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  const btn = document.getElementById('undoBtn');
  if (btn) btn.style.display = '';
  sessions = sessions.filter(x => x.id !== id);
  if (currentId === id) currentId = sessions[0].id;
  renderTabs();
  renderHeader();
  renderStudents();
  saveData();
};

// ======== 表头数据同步 ========
function renderHeader() {
  const s = curSession();
  if (!s) return;
  document.getElementById('classDate').value = s.meta.classDate || '';
  document.getElementById('classPeriod').value = s.meta.classPeriod || '';
  // 恢复主题和课程选择
  const themeSel = document.getElementById('themeSelect');
  themeSel.value = s.meta.courseTheme || '';
  updateCourseList();
  document.getElementById('courseSelect').value = s.meta.courseId != null ? s.meta.courseId : '';
  updateGoalsDisplay();
}

window.onMetaChange = function() {
  const s = curSession();
  if (!s) return;
  s.meta.classDate = document.getElementById('classDate').value;
  s.meta.courseTheme = document.getElementById('themeSelect').value;
  const idx = parseInt(document.getElementById('courseSelect').value);
  s.meta.courseId = isNaN(idx) ? -1 : idx;
  s.meta.classPeriod = document.getElementById('classPeriod').value;
  renderTabs();
  debounceSave();
};

// ======== 课程选择 ========
window.onThemeChange = function() {
  updateCourseList();
  document.getElementById('courseSelect').value = '';
  updateGoalsDisplay();
  onMetaChange();
};

function updateCourseList() {
  const theme = document.getElementById('themeSelect').value;
  const sel = document.getElementById('courseSelect');
  const courses = COURSES[theme] || [];
  sel.innerHTML = '<option value="">' + (courses.length ? '请选择课程' : '暂无课程') + '</option>';
  courses.forEach((c, i) => {
    sel.innerHTML += `<option value="${i}">${c.name}</option>`;
  });
}

window.onCourseChange = function() {
  updateGoalsDisplay();
  onMetaChange();
};

function updateGoalsDisplay() {
  const theme = document.getElementById('themeSelect').value;
  const idx = parseInt(document.getElementById('courseSelect').value);
  const input = document.getElementById('goalsInput');
  const hint = document.getElementById('goalsHint');
  const s = curSession();

  if (theme && !isNaN(idx) && idx >= 0 && COURSES[theme] && COURSES[theme][idx]) {
    // 有选课程 → 自动填充活动目标（可编辑修改）
    const course = COURSES[theme][idx];
    const predefined = course.goals.map((g, i) => `${i+1}. ${g}`).join('\n');
    input.value = predefined;
    if (s) s.customGoals = predefined;
    hint.textContent = '✅ 已自动填充，可继续手动修改';
  } else {
    // 没选课程 → 显示之前手动填写的内容
    if (s && s.customGoals) {
      input.value = s.customGoals;
    } else {
      input.value = '';
    }
    hint.textContent = '✏️ 手动填写活动目标，每行一个';
  }
}

// 手动输入目标 → 自动保存
window.onGoalsInput = function() {
  const input = document.getElementById('goalsInput');
  const s = curSession();
  if (s) {
    s.customGoals = input.value;
    debounceSave();
  }
};

window.copyGoals = function(e) {
  const input = document.getElementById('goalsInput');
  const text = input.value.trim();
  if (!text) { alert('活动目标为空，请先填写或选择课程'); return; }
  navigator.clipboard.writeText(text).then(() => {
    const btn = e.target;
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => {
    // fallback
    input.select();
    document.execCommand('copy');
  });
};

// ======== 学生操作 ========
window.addStudent = function() {
  const s = curSession();
  if (!s) return;
  const name = prompt('输入学生姓名：');
  if (name && name.trim()) {
    s.students.push(makeStudent(name.trim()));
    renderStudents();
    saveData();
    renderTabs();
    setTimeout(() => {
      const list = document.getElementById('list');
      list.lastElementChild?.scrollIntoView({ behavior: 'smooth' });
    }, 50);
  }
};

// 批量导入学生
window.batchImport = function() {
  const s = curSession();
  if (!s) return;
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  div.id = 'batchImportModal';
  div.innerHTML = `<div style="background:#fff;border-radius:12px;padding:20px;max-width:480px;width:90%">

    <textarea id="batchInput" style="width:100%;min-height:180px;padding:10px;font-size:14px;font-family:inherit;border:1px solid #ddd;border-radius:6px" placeholder="书韬&#10;汉庭&#10;陈俊晨, 莫雅欣, 叶锦轩"></textarea>
    <div style="margin-top:10px;display:flex;gap:8px">

window.doBatchImport = function() {
  const ta = document.getElementById('batchInput');
  if (!ta) return;
  const raw = ta.value.trim();
  if (!raw) { alert('请先输入学生姓名'); return; }
  // 先按行拆分，每行再按逗号/空格/中文逗号拆分
  const names = raw.split(/\n/).flatMap(line =>
    line.split(/[,，、\s]+/).map(n => n.trim()).filter(Boolean)
  );
  if (names.length === 0) { alert('没有有效的姓名'); return; }
  const s = curSession();
  if (!s) return;
  pushUndo('批量导入 ' + names.length + ' 人');
  names.forEach(n => s.students.push(makeStudent(n)));
  renderStudents();
  saveData();
  renderTabs();
  // 关闭弹窗
  closeBatchImport();
  // 提示
  const list = document.getElementById('list');
  list.lastElementChild?.scrollIntoView({ behavior: 'smooth' });
};

window.closeBatchImport = function() {
  const modal = document.getElementById('batchImportModal');
  if (modal) document.body.removeChild(modal);
};

window.removeStudent = function(idx) {
  const s = curSession();
  if (!s) return;
  if (!confirm(`确定删除「${s.students[idx].name}」吗？`)) return;
  pushUndo('删除 ' + s.students[idx].name);
  s.students.splice(idx, 1);
  renderStudents();
  saveData();
  renderTabs();
};

window.clearStudents = function() {
  const s = curSession();
  if (!s) return;
  if (!confirm('确定清空当前课堂的所有学生？')) return;
  pushUndo('清空学生');
  undoStack[undoStack.length-1].type = 'clear';
  s.students = [];
  renderStudents();
  saveData();
  renderTabs();
};

window.renameStudent = function(idx) {
  const s = curSession();
  if (!s) return;
  const newName = prompt('修改学生姓名：', s.students[idx].name);
  if (newName && newName.trim()) {
    s.students[idx].name = newName.trim();
    renderStudents();
    debounceSave();
  }
};

// ======== 交互函数（供行内使用）=======
window.toggleStar = function(btn, idx, cat, val) {
  const st = curStudents();
  if (!st[idx]) return;
  st[idx].stars[cat] = st[idx].stars[cat] === val ? 0 : val;
  const row = btn.parentElement;
  row.querySelectorAll('.star-btn').forEach((b, i) => {
    b.classList.toggle('on', i < st[idx].stars[cat]);
  });
  debounceSave();
};

window.toggleCheck = function(el, idx, key) {
  const st = curStudents();
  if (!st[idx]) return;
  st[idx].checks[key] = el.checked;
  debounceSave();
};

window.toggleTag = function(el, idx, text) {
  const st = curStudents();
  if (!st[idx]) return;
  const arr = st[idx].tags;
  const pos = arr.indexOf(text);
  // 提取中文标签名（去掉 emoji）
  const label = text.replace(/^[^a-zA-Z\u4e00-\u9fff]+/, '').replace(/\s+/g, '');
  const prefix = label + '：';

  if (pos >= 0) {
    // 关掉标签 → 去掉备注中对应行
    arr.splice(pos, 1);
    el.classList.remove('on');
    st[idx].note = st[idx].note
      .split('\n')
      .filter(line => !line.startsWith(prefix))
      .join('\n')
      .replace(/^\n+|\n+$/g, '');
  } else {
    // 打开标签 → 追加一行
    arr.push(text);
    el.classList.add('on');
    const note = st[idx].note || '';
    if (!note.includes(prefix)) {
      st[idx].note = note ? note + '\n' + prefix : prefix;
    }
  }

  // 同步更新页面上的 textarea，并自动聚焦
  const card = el.closest('.card');
  if (card) {
    const ta = card.querySelector('textarea');
    if (ta) {
      ta.value = st[idx].note;
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }
  }

  debounceSave();
};

window.updateNote = function(el, idx) {
  const st = curStudents();
  if (!st[idx]) return;
  st[idx].note = el.value;
  debounceSave();
};

// ======== 语音输入 ========
let voiceRecognition = null;
let voiceTargetIdx = -1;     // -1 = goals, >=0 = student index
let voiceTargetEl = null;
let voiceIsRecording = false;
let voiceRetryCount = 0;
const MAX_VOICE_RETRIES = 8;

// 检测浏览器是否支持语音识别
const VoiceSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

window.startVoiceInput = function(btn, idx) {
  // idx: -1 = 活动目标, >=0 = 学生索引
  // 如果正在录，点一下停止
  if (voiceIsRecording && voiceTargetIdx === idx) {
    stopVoiceInput();
    return;
  }

  // 如果正在录别的，先停掉
  if (voiceIsRecording) {
    stopVoiceInput();
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    // 检测是否 file:// 协议
    if (location.protocol === 'file:') {
      alert('⚠️ 本地文件不支持语音识别！\n\n解决办法：\n1️⃣ 用 GitHub Pages 打开：\n   https://920983424-ops.github.io/lego-class-tool/\n\n2️⃣ 或者安装 Live Server（VS Code 插件）打开');
    } else {
      alert('⚠️ 您的浏览器不支持语音输入，请使用 Chrome 或 Edge 浏览器');
    }
    return;
  }

  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'zh-CN';
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = true;
  voiceRecognition.maxAlternatives = 1;

  voiceTargetIdx = idx;
  voiceTargetEl = btn;
  voiceIsRecording = true;
  voiceRetryCount = 0;

  // UI反馈：点亮按钮
  btn.classList.add('recording');
  btn.textContent = '⏹';
  btn.title = '点击停止录音';

  // 显示提示文字
  const card = btn.closest('.card');
  const hint = card ? card.querySelector('.voice-hint') : document.getElementById('goalsVoiceHint');
  if (hint) hint.classList.add('show');

  voiceRecognition.onresult = function(event) {
    // 只取最终结果（isFinal），避免重复追加
    let finalText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript;
      }
    }
    if (!finalText) return;

    // 获取目标文本区域
    if (idx >= 0) {
      // 学生备注
      const st = curStudents();
      if (st && st[idx]) {
        st[idx].note = (st[idx].note || '') + finalText;
      }
      const ta = btn.closest('.card')?.querySelector('textarea');
      if (ta) {
        const st = curStudents();
        ta.value = st?.[idx]?.note || '';
      }
    } else {
      // 活动目标
      const ta = document.getElementById('goalsInput');
      if (ta) {
        ta.value = ta.value + (ta.value ? '\n' : '') + finalText;
        if (curSession()) curSession().customGoals = ta.value;
      }
    }
    debounceSave();
  };

  voiceRecognition.onerror = function(event) {
    console.warn('语音识别错误:', event.error);
    if (event.error === 'not-allowed') {
      if (location.protocol === 'file:') {
        alert('⚠️ 麦克风被拒绝！\n\n本地文件（file://）Chrome 不允许使用麦克风。\n\n✅ 请改用这个网址打开：\nhttps://920983424-ops.github.io/lego-class-tool/');
      } else {
        alert('⚠️ 麦克风权限被拒绝，请在浏览器设置中允许麦克风访问');
      }
    } else if (event.error === 'no-speech') {
      // 没说话，让 onend 去重试（有次数限制）
    } else if (event.error === 'aborted') {
      // 用户主动停止或浏览器中断，不处理
    } else {
      console.warn('语音识别错误:', event.error);
    }
    stopVoiceInput();
  };

  voiceRecognition.onend = function() {
    // 如果还在录音状态但引擎停了（比如说话停顿太久），重新启动（有限次）
    if (voiceIsRecording && voiceTargetIdx === idx && voiceRetryCount < MAX_VOICE_RETRIES) {
      voiceRetryCount++;
      try {
        voiceRecognition.start();
      } catch(e) {
        stopVoiceInput();
      }
    } else {
      if (voiceRetryCount >= MAX_VOICE_RETRIES) {
        console.warn('语音识别达到最大重试次数，自动停止');
      }
      stopVoiceInput();
    }
  };

  try {
    voiceRecognition.start();
  } catch(e) {
    stopVoiceInput();
  }
};

function stopVoiceInput() {
  voiceIsRecording = false;
  if (voiceRecognition) {
    try { voiceRecognition.stop(); } catch(e) {}
    voiceRecognition = null;
  }

  // 重置所有 mic 按钮
  document.querySelectorAll('.mic-btn').forEach(b => {
    b.classList.remove('recording');
    b.textContent = '🎤';
    b.title = '语音输入';
  });

  // 隐藏提示
  document.querySelectorAll('.voice-hint').forEach(h => h.classList.remove('show'));

  voiceTargetIdx = -1;
  voiceTargetEl = null;
}

window.updateStatus = function(el, idx) {
  const st = curStudents();
  if (!st[idx]) return;
  st[idx].status = el.value;
  const card = el.closest('.card');
  card.className = 'card';
  if (el.value) card.classList.add(el.value);
  debounceSave();
};

// ======== 导出给小咪 ========
window.exportToAI = function() {
  const s = curSession();
  if (!s) return;
  const m = s.meta;
  let courseName = '';
  if (m.courseTheme && m.courseId >= 0) {
    const c = COURSES[m.courseTheme];
    if (c && c[m.courseId]) courseName = c[m.courseId].name;
  }
  const total = s.students.length;
  const goodCount = s.students.filter(st => st.status === 'good').length;
  const issueCount = s.students.filter(st => st.status === 'issue').length;
  let lines = [`课程：${courseName || '未填'} | 日期：${m.classDate || '未填'} | 时段：${m.classPeriod || ''}`];
  lines.push(`📊 本节共 ${total} 名学生${goodCount ? '，优秀 ' + goodCount + ' 人' : ''}${issueCount ? '，需关注 ' + issueCount + ' 人' : ''}`);
  lines.push('');

  // 活动目标（优先使用文本框中的内容，无论是否选课程）
  const goalsText = document.getElementById('goalsInput')?.value?.trim();
  if (goalsText) {
    lines.push('活动目标：');
    goalsText.split('\n').forEach(line => {
      if (line.trim()) lines.push(line.trim());
    });
    lines.push('');
  }

  s.students.forEach(st => {
    lines.push(`## ${st.name}`);
    const checked = Object.entries(st.checks).filter(([k,v])=>v).map(([k])=>k.split('|')[1]);
    if (checked.length) lines.push(`勾选：${checked.join('、')}`);
    const stars = [];
    ['搭建','编程','总评'].forEach(c => {
      if (st.stars[c]) stars.push(`${c}：${st.stars[c]}分`);
    });
    if (stars.length) lines.push(`评分：${stars.join(' | ')}`);
    if (st.tags.length) lines.push(`标记：${st.tags.join(' ')}`);
    if (st.note.trim()) lines.push(`备注：${st.note.trim()}`);
    lines.push('');
  });
  const text = lines.join('\n');
  const div = document.createElement('div');
  div.id = 'exportModal';
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  div.innerHTML = `<div style="background:#fff;border-radius:12px;padding:20px;max-width:600px;width:90%;max-height:80vh;overflow:auto">
    <div style="margin-bottom:10px;font-size:15px;font-weight:600">📤 复制下面内容，发消息给小咪：</div>
    <textarea readonly id="exportText" style="width:100%;min-height:260px;padding:10px;font-size:13px;font-family:monospace;border:1px solid #ddd;border-radius:6px;background:#f5f6f8">${text}</textarea>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button id="copyExportBtn" class="btn btn-primary" onclick="copyExport()">📋 复制</button>
      <button class="btn btn-outline" onclick="closeExportModal()">关闭</button>
    </div></div>`;
  document.body.appendChild(div);
};

// 复制导出文本（兼容 file:// 协议）
window.copyExport = function() {
  const ta = document.getElementById('exportText');
  if (!ta) return;
  ta.select();
  ta.setSelectionRange(0, 999999); // 针对移动端
  try {
    document.execCommand('copy');
  } catch(e) {
    // 实在不行就提示手动选
    alert('复制失败，请手动选择文字后按 Ctrl+C');
    return;
  }
  // 找复制按钮改文字
  const btn = document.getElementById('copyExportBtn');
  if (btn) {
    btn.textContent = '✅ 已复制！';
    setTimeout(() => btn.textContent = '📋 复制', 2000);
  }
};

window.closeExportModal = function() {
  const modal = document.getElementById('exportModal');
  if (modal) document.body.removeChild(modal);
};

// ======== JSON 备份（所有课堂一起导出）=======
window.exportJSON = function() {
  const data = { version:1, exportedAt:new Date().toISOString(), sessions, currentId };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `课堂记录备份_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
};

window.importJSON = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.sessions || !Array.isArray(data.sessions)) {
        alert('❌ 无效的备份文件'); return;
      }
      // 合并还是替换？这里直接替换
      if (sessions.length > 0 && !confirm('导入备份将替换当前所有数据，确定吗？')) return;
      sessions = data.sessions;
      currentId = data.currentId || sessions[0].id;
      // 补全和兼容数据
      sessions.forEach(s => {
        if (!s.id) s.id = Date.now() + '_' + Math.random().toString(36).slice(2,6);
        if (!s.meta) s.meta = { classDate:'', courseTheme:'', courseId:-1, classPeriod:'' };
        // 兼容旧数据（className → courseTheme/courseId）
        if (s.meta.className && !s.meta.courseTheme) {
          // 尝试在 COURSES 中匹配课程名
          let found = false;
          for (const theme of Object.keys(COURSES)) {
            const idx = COURSES[theme].findIndex(c => c.name === s.meta.className);
            if (idx >= 0) {
              s.meta.courseTheme = theme;
              s.meta.courseId = idx;
              found = true;
              break;
            }
          }
          if (!found) {
            s.meta.courseTheme = '';
            s.meta.courseId = -1;
          }
          delete s.meta.className;
        }
        if (!s.students) s.students = [];
        s.students.forEach(st => {
          if (!st.stars) st.stars = {搭建:0,编程:0,总评:0};
          if (!st.tags) st.tags = [];
          if (!st.note) st.note = '';
          if (!st.status) st.status = '';
          if (!st.checks) st.checks = {};
        });
      });
      renderAll();
      saveData();
      alert('✅ 备份恢复成功！');
    } catch(err) {
      alert('❌ 备份解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
};

// ======== 渲染学生 ========
function renderStudents() {
  const list = document.getElementById('list');
  const sts = curStudents();
  if (!sts || sts.length === 0) {
    list.innerHTML = `<div class="empty-tip">👆 点击「➕ 加学生」添加本节课的学生</div>`;
    return;
  }
  list.innerHTML = sts.map((s, idx) => {
    // 勾选框
    let chkHTML = CHECK_ITEMS.map(g => {
      let items = g.items.map(item => {
        const key = g.title + '|' + item;
        const checked = s.checks[key] ? 'checked' : '';
        return `<label><input type="checkbox" onclick="toggleCheck(this,${idx},'${key}')" ${checked}><span>${item}</span></label>`;
      }).join('');
      return `<div class="sec-title">${g.title}</div><div class="chk-group">${items}</div>`;
    }).join('');

    // 星星
    let starHTML = '';
    ['搭建','编程','总评'].forEach(cat => {
      const val = s.stars[cat] || 0;
      let btns = '';
      for (let i = 1; i <= 5; i++) {
        btns += `<button type="button" class="star-btn ${i<=val?'on':''}" onclick="toggleStar(this,${idx},'${cat}',${i})">★</button>`;
      }
      starHTML += `<div class="star-row"><span class="label">${cat}</span>${btns}</div>`;
    });

    // 快速标签
    let tagHTML = TAG_LIST.map(t => {
      const on = s.tags.includes(t.text) ? 'on' : '';
      return `<button type="button" class="tag-btn ${t.cls} ${on}" onclick="toggleTag(this,${idx},'${t.text}')">${t.text}</button>`;
    }).join('');

    // 状态
    const sel = ['','good','mid','issue'];
    const selLabel = ['— 标记 —','🟢 优秀','🟡 一般','🔴 关注'];

    return `
      <div class="card ${s.status}">
        <div class="card-top">
          <span class="name" onclick="renameStudent(${idx})" title="点击改名">${escapeHtml(s.name)}</span>
          <select onchange="updateStatus(this,${idx})" style="font-size:12px;padding:2px 5px;border-radius:6px;border:1px solid #ddd">
            ${sel.map((v,i) => `<option value="${v}" ${s.status===v?'selected':''}>${selLabel[i]}</option>`).join('')}
          </select>
          <button class="del" onclick="removeStudent(${idx})" title="删除">✕</button>
        </div>
        ${chkHTML}
        <div class="sec-title" style="margin-top:8px">⭐ 评分</div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px">${starHTML}</div>
        <div class="sec-title">📌 快速标记</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">${tagHTML}</div>
        <div class="note-wrap">
          <textarea placeholder="亮点 / 待改进 / 备注…" oninput="updateNote(this,${idx})">${escapeHtml(s.note)}</textarea>
          <button type="button" class="mic-btn" onclick="startVoiceInput(this,${idx})" title="语音输入">🎤</button>
        </div>
        <div class="voice-hint">🎤 录音中… 说话自动转文字</div>
      </div>`;
  }).join('');
}

function renderAll() {
  renderTabs();
  renderHeader();
  renderStudents();
}

// ======== 登录弹窗 / 邮箱登录 ========
window.showLoginModal = function() {
  // 移除旧弹窗
  const old = document.querySelector('.modal-overlay');
  if (old) old.remove();

  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.id = 'loginModal';
  div.innerHTML = `
    <div class="modal-box" onclick="event.stopPropagation()">
      <button class="close-btn" onclick="closeLoginModal()">×</button>
      <h3>🔑 登录课堂记录表</h3>
      <div class="desc">登录后数据自动同步到云端，换设备也能用</div>

      <button class="btn-block btn-google" onclick="handleGoogleLogin()">🌐 使用 Google 账号登录</button>

      <div class="divider"><span>或</span></div>

      <div id="emailLoginForm">
        <input type="email" id="loginEmail" placeholder="邮箱地址（QQ/163/Google 等）" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="密码（至少6位）" autocomplete="current-password">
        <div class="row">
          <button class="btn-block btn-email" onclick="handleEmailLogin()">📧 登录</button>
          <button class="btn-block btn-email" onclick="handleEmailRegister()" style="background:#34c759">✨ 注册</button>
        </div>
        <div id="loginError" style="color:#ff3b30;font-size:13px;margin-top:6px;display:none"></div>
      </div>
    </div>`;
  document.body.appendChild(div);

  // 回车键登录
  div.querySelector('#loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleEmailLogin();
  });
};

window.closeLoginModal = function() {
  const el = document.getElementById('loginModal');
  if (el) el.remove();
};

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  if (el) { el.textContent = msg; el.style.display = ''; }
}

// Google 登录
window.handleGoogleLogin = function() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e) {
    showLoginError('Google 登录失败：' + e.message);
  });
};

// 邮箱密码登录
window.handleEmailLogin = function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email) { showLoginError('请输入邮箱'); return; }
  if (!pass) { showLoginError('请输入密码'); return; }
  showLoginError('登录中…');
  auth.signInWithEmailAndPassword(email, pass).catch(function(e) {
    if (e.code === 'auth/user-not-found') {
      showLoginError('该邮箱未注册，请先点击「注册」创建账号');
    } else if (e.code === 'auth/wrong-password') {
      showLoginError('密码错误');
    } else if (e.code === 'auth/invalid-email') {
      showLoginError('邮箱格式不正确');
    } else if (e.code === 'auth/invalid-credential') {
      showLoginError('邮箱或密码错误');
    } else {
      showLoginError('登录失败：' + e.message);
    }
  });
};

// 邮箱密码注册
window.handleEmailRegister = function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email) { showLoginError('请输入邮箱'); return; }
  if (!pass) { showLoginError('请输入密码'); return; }
  if (pass.length < 6) { showLoginError('密码至少 6 位'); return; }
  showLoginError('注册中…');
  auth.createUserWithEmailAndPassword(email, pass).catch(function(e) {
    if (e.code === 'auth/email-already-in-use') {
      showLoginError('该邮箱已注册，请直接登录');
    } else {
      showLoginError('注册失败：' + e.message);
    }
  });
};

window.handleLogout = function() {
  if (!confirm('确定退出登录？退出后本地数据还在，但不会自动同步到云端')) return;
  auth.signOut();
};

// 监听登录状态
auth.onAuthStateChanged(function(user) {
  const loginBtn = document.getElementById('loginBtn');
  const userInfo = document.getElementById('userInfo');
  const userName = document.getElementById('userName');
  const cloudStatus = document.getElementById('cloudStatus');

  if (user) {
    currentUser = user;
    closeLoginModal();
    loginBtn.style.display = 'none';
    userInfo.style.display = '';
    userName.textContent = user.displayName || user.email || '用户';
    cloudStatus.textContent = '☁️ 加载中…';

    // 检查是否是本地数据为空但云端有数据
    if (sessions.length === 0) {
      loadFromCloud();
    } else {
      // 有本地数据 → 同步到云端
      scheduleCloudSave();
      renderAll();
    }
  } else {
    currentUser = null;
    loginBtn.style.display = '';
    userInfo.style.display = 'none';
    cloudStatus.textContent = '💻 本地模式';

    // 未登录：只用 localStorage
    if (!loadFromLocal()) {
      const s = makeSession();
      sessions = [s]; currentId = s.id;
      saveData();
    }
    renderAll();
  }
});

// ======== 启动 ========
// 先尝试从本地加载数据，同时 Firebase auth 会异步触发 onAuthStateChanged
if (!loadFromLocal()) {
  const s = makeSession();
  sessions = [s]; currentId = s.id;
}
renderAll();
</script>
