/* ================================================================
   基础样式
   ================================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei","PingFang SC",sans-serif;
  background: var(--bg); padding: 20px; color: var(--text);
}
.container { max-width: 1000px; margin: 0 auto; padding-bottom: 40px; }

/* ================================================================
   标签栏
   ================================================================ */
.tabs {
  display: flex; gap: 0; margin-bottom: 12px; overflow-x: auto;
  padding: 0 4px; flex-wrap: nowrap;
}
.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 10px 10px 0 0;
  font-size: 14px; font-weight: 600; cursor: pointer;
  background: var(--tab-bg); color: var(--text-secondary); white-space: nowrap;
  border: none; transition: all 0.15s;
  margin-right: 3px; flex-shrink: 0;
}
.tab:hover { background: var(--tab-hover); }
.tab.active { background: var(--surface); color: var(--text); box-shadow: var(--tab-active-shadow); }
.tab .close {
  font-size: 14px; color: var(--text-muted); padding: 4px 6px; cursor: pointer;
  border-radius: 4px; line-height: 1; min-width: 24px; text-align: center;
}
.tab .close:hover { color: var(--danger); background: var(--danger-hover-bg); }
.tab-add {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 14px; border-radius: 10px 10px 0 0;
  font-size: 14px; font-weight: 600; cursor: pointer;
  background: transparent; color: var(--primary); white-space: nowrap;
  border: 2px dashed var(--border); border-bottom: none;
  transition: all 0.15s; flex-shrink: 0;
}
.tab-add:hover { background: var(--primary-light); border-color: var(--primary); }

/* ================================================================
   表头 & 工具栏
   ================================================================ */
.header {
  background: var(--surface); border-radius: 0 12px 12px 12px; padding: 14px 18px; margin-bottom: 12px;
  box-shadow: var(--shadow);
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.header label { display: flex; align-items: center; gap: 4px; font-size: 14px; color: var(--text-secondary); }
.header input, .header select {
  padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
  background: var(--input-bg); color: var(--text);
}

.toolbar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.btn {
  padding: 6px 14px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
  font-weight: 600; transition: all 0.15s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: var(--surface); color: var(--btn-outline-color); border: 1px solid var(--btn-outline-border); }
.btn-small { padding: 3px 10px; font-size: 12px; }

.search-wrap {
  display: flex; align-items: center; gap: 4px; margin-left: auto;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 3px 8px;
}
.search-wrap input {
  border: none; outline: none; font-size: 13px; width: 140px;
  background: transparent; color: var(--text);
}
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap .search-clear {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 14px; padding: 2px 4px; display: none;
}
.search-wrap .search-clear.visible { display: block; }

.sort-select {
  padding: 3px 6px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; background: var(--input-bg); color: var(--text-secondary);
}

/* ================================================================
   学生卡片
   ================================================================ */
.card {
  background: var(--surface); border-radius: 12px; padding: 14px 18px; margin-bottom: 10px;
  box-shadow: var(--shadow); border-left: 4px solid var(--card-default-border);
}
.card.good { border-left-color: var(--card-good-border); background: var(--card-good-bg); }
.card.mid  { border-left-color: var(--card-mid-border);  background: var(--card-mid-bg); }
.card.issue{ border-left-color: var(--card-issue-border);background: var(--card-issue-bg); }

.card-top {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.card-top .name {
  font-size: 16px; font-weight: 700; min-width: 50px; cursor: pointer;
  padding: 2px 6px; border-radius: 4px;
}
.card-top .name:hover { background: var(--surface-hover); }
.card-top .del { margin-left: auto; background: none; border: none; color: var(--close-color); font-size: 18px; cursor: pointer; padding: 4px 8px; min-width: 32px; }
.card-top .del:hover { color: var(--close-hover); }

.sec-title { font-size: 12px; font-weight: 700; color: var(--text-muted); margin: 6px 0 4px; letter-spacing: 0.3px; }

.chk-group { display: flex; flex-wrap: wrap; gap: 5px; }
.chk-group label {
  display: flex; align-items: center; gap: 3px; font-size: 13px;
  background: var(--chk-bg); padding: 3px 9px 3px 7px; border-radius: 6px;
  cursor: pointer; user-select: none; border: 1px solid transparent;
  color: var(--text-secondary);
}
.chk-group label:has(input:checked) { background: var(--chk-checked-bg); border-color: var(--chk-checked-border); }

.star-btn {
  font-size: 24px; background: none; border: none; padding: 2px 4px;
  cursor: pointer; color: var(--star-off); line-height: 1; min-width: 28px;
}
.star-btn:hover { color: var(--star-hover); }
.star-btn.on { color: var(--star-on); }

.star-row { display: flex; align-items: center; gap: 2px; margin-right: 14px; }
.star-row .label { font-size: 13px; color: var(--text-secondary); min-width: 30px; }

.tag-btn {
  display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px;
  font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; opacity: 0.4;
}
.tag-btn.on { opacity: 1; box-shadow: 0 0 0 2px currentColor; }
.tag-btn:hover { transform: scale(1.05); opacity: 0.8; }
.tg-green  { background: #d1fae5; color: #065f46; }
.tg-yellow { background: #fef3c7; color: #92400e; }
.tg-red    { background: #fee2e2; color: #991b1b; }
.tg-blue   { background: #dbeafe; color: #1e40af; }

textarea {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  resize: vertical; min-height: 40px; font-size: 13px; font-family: inherit;
  margin-top: 6px; background: var(--textarea-bg); color: var(--text);
}
textarea:focus { outline: 2px solid var(--textarea-focus); border-color: var(--textarea-focus); }

/* ================================================================
   语音输入
   ================================================================ */
.mic-btn {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border: none; border-radius: 50%;
  background: var(--mic-bg); color: var(--text-secondary); font-size: 16px; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.mic-btn:hover { background: var(--mic-hover); }
.mic-btn.recording {
  background: var(--danger); color: #fff;
  animation: mic-pulse 0.8s ease-in-out infinite;
  box-shadow: 0 0 0 4px rgba(255,59,48,0.2);
}
@keyframes mic-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.mic-btn.recording::after {
  content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
  animation: mic-ring 1.2s ease-out infinite;
  border: 2px solid rgba(255,59,48,0.4);
}
@keyframes mic-ring {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1.6); opacity: 0; }
}
.mic-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.note-wrap { display: flex; gap: 6px; align-items: flex-start; margin-top: 6px; }
.note-wrap textarea { margin-top: 0; flex: 1; }
.voice-hint {
  font-size: 11px; color: var(--danger); padding: 2px 0 0 0;
  display: none; transition: all 0.2s;
}
.voice-hint.show { display: block; }

/* ================================================================
   弹窗
   ================================================================ */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--modal-overlay); z-index: 9999;
  display: flex; align-items: center; justify-content: center;
}
.modal-box {
  background: var(--surface); border-radius: 16px; padding: 28px 32px;
  width: 360px; max-width: 90%; box-shadow: var(--shadow-lg);
}
.modal-box h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
.modal-box .desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
.modal-box .desc strong { color: var(--text); }
.modal-box .btn-block {
  display: block; width: 100%; padding: 11px; margin-bottom: 10px;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.modal-box .btn-block:hover { transform: translateY(-1px); }
.modal-box .btn-google { background: var(--google-btn-bg); color: var(--google-btn-color); border: 1px solid var(--google-btn-border); }
.modal-box .btn-google:hover { background: var(--google-btn-hover); }
.modal-box .btn-email { background: var(--primary); color: #fff; }
.modal-box .btn-email:hover { background: var(--primary-hover); }
.modal-box .divider {
  text-align: center; color: var(--text-muted); font-size: 12px; margin: 14px 0;
  display: flex; align-items: center; gap: 10px;
}
.modal-box .divider::before, .modal-box .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--divider);
}
.modal-box input[type="email"], .modal-box input[type="password"] {
  display: block; width: 100%; padding: 10px 12px; margin-bottom: 10px;
  border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
  box-sizing: border-box; background: var(--input-bg); color: var(--text);
}
.modal-box input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
.modal-box .row { display: flex; gap: 8px; }
.modal-box .row .btn-block { flex: 1; }
.modal-box .close-btn {
  float: right; background: none; border: none; font-size: 22px;
  color: var(--modal-close); cursor: pointer; padding: 0; line-height: 1;
}
.modal-box .close-btn:hover { color: var(--modal-close-hover); }

.verify-modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: var(--modal-overlay); z-index: 9999;
  display: flex; align-items: center; justify-content: center;
}

/* ================================================================
   Toast 通知
   ================================================================ */
.toast-container {
  position: fixed; bottom: 20px; right: 20px; z-index: 99999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-lg); pointer-events: auto;
  opacity: 0; transform: translateX(40px); transition: all 0.3s ease;
  max-width: 360px;
}
.toast.show { opacity: 1; transform: translateX(0); }
.toast-info    { background: var(--primary); color: #fff; }
.toast-success { background: var(--success); color: #fff; }
.toast-warning { background: var(--warning); color: #1a1a2e; }
.toast-error   { background: var(--danger); color: #fff; }

/* ================================================================
   其他
   ================================================================ */
.file-input-wrap { display: none; }
.empty-tip { text-align: center; padding: 60px 20px; color: var(--empty-tip-color); font-size: 15px; }
.no-results { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 14px; display: none; }

/* ================================================================
   打印样式
   ================================================================ */
@media print {
  body { background: #fff; padding: 10px; color: #000; }
  .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; background: #fff; }
  .tab, .tab-add, .toolbar, .header, #authBar, #toastContainer,
  .del, .btn, .search-wrap, .sort-select, .mic-btn, .voice-hint { display: none !important; }
}
</style>
</head>

<div class="container" id="app">

<!-- ====== 顶栏：登录 + 暗色模式 ====== -->
<div id="authBar" style="display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--surface);border-radius:12px;padding:10px 18px;box-shadow:var(--shadow)">
  <span style="font-size:14px;font-weight:600;color:var(--text)">🐱 课堂记录表</span>
  <span style="flex:1"></span>
  <button id="themeToggle" class="btn btn-outline btn-small" onclick="toggleTheme()" title="切换亮色/暗色模式" aria-label="切换亮色/暗色模式">🌙</button>
  <button id="loginBtn" class="btn btn-primary" onclick="showLoginModal()">🔑 登录</button>
  <span id="userInfo" style="display:none;font-size:13px;color:var(--text-secondary)">
    👤 <span id="userName"></span>
    <button class="btn btn-outline btn-small" onclick="handleLogout()" style="margin-left:6px">退出</button>
  </span>
  <span id="cloudStatus" style="font-size:12px;color:var(--text-muted)"></span>
</div>

<!-- 标签栏 -->
<div class="tabs" id="tabBar"></div>

<!-- 表头 -->
<div class="header" id="headerArea">
  <label>📅 <input type="date" id="classDate" onchange="onMetaChange()" aria-label="上课日期"></label>
  <label>🔖 <select id="themeSelect" onchange="onThemeChange()" aria-label="课程主题">
    <option value="">选择主题</option>
    <option value="7+">7+ (WeDo)</option>
    <option value="8+">8+ (SPIKE)</option>
    <option value="9+">9+ (SPIKE Python)</option>
    <option value="FLL">FLL 比赛</option>
    <option value="WRC-Pook">WRC-Pook 比赛</option>
    <option value="WRO">WRO 比赛</option>
    <option value="航天比赛">航天比赛</option>
  </select></label>
  <label>📚 <select id="courseSelect" onchange="onCourseChange()" aria-label="具体课程"><option value="">请先选择主题</option></select></label>
  <label>🕐 <input type="text" id="classPeriod" placeholder="如：上午 10:00" onchange="onMetaChange()" style="width:120px" aria-label="上课时段"></label>
  <div style="width:100%;margin-top:4px">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
      <span style="font-size:13px;font-weight:600;color:var(--text-secondary)">🎯 活动目标</span>
      <span id="goalsHint" style="font-size:11px;color:var(--text-muted)"></span>
      <span style="flex:1"></span>
      <button type="button" class="btn btn-outline btn-small" onclick="copyGoals(event)" title="复制活动目标" aria-label="复制活动目标">📋 复制</button>
      <button type="button" class="mic-btn" id="goalsMicBtn" onclick="startVoiceInput(this,-1)" title="语音输入活动目标" aria-label="语音输入活动目标">🎤</button>
    </div>
    <textarea id="goalsInput" rows="3" placeholder="活动目标，每行一个…" oninput="onGoalsInput()" aria-label="活动目标输入"></textarea>
    <div class="voice-hint" id="goalsVoiceHint">🎤 录音中… 说话自动转文字</div>
  </div>
</div>

<!-- 工具栏 -->
<div class="toolbar" id="toolbarArea">
  <button class="btn btn-success" onclick="addStudent()" aria-label="添加学生">➕ 加学生</button>
  <button class="btn btn-outline" onclick="batchImport()" aria-label="批量导入学生">📋 批量导入</button>

// ================================================================
// 3. 数据模型
// ================================================================
let sessions = [];
let currentId = null;
let storageOK = true;
let autoSaveTimer = null;
let undoStack = [];
let searchQuery = '';
let sortBy = 'default';

// 从 sessionStorage 恢复撤销栈和排序偏好
try {
  const saved = sessionStorage.getItem('lego_undo');
  if (saved) undoStack = JSON.parse(saved);
  sortBy = localStorage.getItem(C.SORT_KEY) || 'default';
} catch(e) {}

function makeSession() {
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0];
  return {
    id: Date.now() + '_' + Math.random().toString(36).slice(2,6),
    meta: { classDate: dateStr, courseTheme: '', courseId: -1, classPeriod: '' },
    customGoals: '',
    students: []
  };
}

function makeStudent(name) {
  return { name, checks:{}, stars:{搭建:0,编程:0,总评:0}, tags:[], note:'', status:'' };
}

function curSession() {
  return sessions.find(s => s.id === currentId) || null;
}

function curStudents() {
  const s = curSession();
  return s ? s.students : [];
}

// ================================================================
// 4. XSS 防护 & 工具函数
// ================================================================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function persistUndo() {
  try { sessionStorage.setItem('lego_undo', JSON.stringify(undoStack)); } catch(e) {}
}

function pushUndo(label) {
  const s = curSession();
  if (!s) return;
  undoStack.push({
    label: label,
    type: 'students',
    students: JSON.parse(JSON.stringify(s.students)),
    sessionId: s.id
  });
  if (undoStack.length > C.MAX_UNDO) undoStack.shift();
  persistUndo();
  const btn = document.getElementById('undoBtn');
  if (btn) btn.style.display = '';
}

window.handleUndo = function() {
  if (!undoStack.length) return;
  const action = undoStack.pop();
  persistUndo();
  if (!undoStack.length) {
    const btn = document.getElementById('undoBtn');
    if (btn) btn.style.display = 'none';
  }

  if (action.type === 'session') {
    // 恢复被删除的课堂
    const restored = action.session;
    if (!sessions.find(s => s.id === restored.id)) {
      sessions.push(restored);
    }
    currentId = restored.id;
    renderAll();
    saveData();
    showToast('已恢复课堂「' + action.label.replace('删除课堂「','').replace('」','') + '」', 'success');
  } else {
    // 恢复学生列表
    const s = sessions.find(x => x.id === action.sessionId);
    if (s) {
      s.students = action.students;
      renderStudents();
      renderTabs();
      saveData();
      showToast('已撤销：' + action.label, 'info');
    }
  }
};

// ================================================================
// 5. Toast 通知
// ================================================================
function showToast(msg, type, duration) {
  type = type || 'info';
  duration = duration || 3000;
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = msg;
  toast.setAttribute('role', 'status');
  container.appendChild(toast);
  requestAnimationFrame(function() { toast.classList.add('show'); });
  setTimeout(function() {
    toast.classList.remove('show');
    setTimeout(function() {
      if (toast.parentNode) container.removeChild(toast);
    }, 300);
  }, duration);
}

// ================================================================
// 6. 主题管理（暗色模式）
// ================================================================
function initTheme() {
  var saved = localStorage.getItem(C.THEME_KEY);
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
    updateThemeIcon();
  }
}

window.toggleTheme = function() {
  var html = document.documentElement;
  html.classList.toggle('dark');
  var isDark = html.classList.contains('dark');
  localStorage.setItem(C.THEME_KEY, isDark ? 'dark' : 'light');
  updateThemeIcon();
  showToast(isDark ? '已切换为暗色模式 🌙' : '已切换为亮色模式 ☀️', 'info', 2000);
};

function updateThemeIcon() {
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
}

// ================================================================
// 7. 本地存储
// ================================================================
function saveData() {
  if (!storageOK) return;
  try {
    localStorage.setItem(C.SAVE_KEY, JSON.stringify({ sessions: sessions, currentId: currentId }));
    scheduleCloudSave();
  } catch(e) { storageOK = false; }
}

function debounceSave() {
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveData, C.DEBOUNCE_MS);
}

function loadFromLocal() {
  try {
    var saved = localStorage.getItem(C.SAVE_KEY);
    if (saved) {
      var data = JSON.parse(saved);
      if (data.sessions && data.sessions.length > 0) {
        sessions = data.sessions;
        currentId = data.currentId || sessions[0].id;
        migrateSessions(sessions);
        return true;
      }
    }
  } catch(e) { storageOK = false; }
  return false;
}

function migrateSessions(arr) {
  arr.forEach(function(s) {
    if (!s.meta) s.meta = { classDate:'', courseTheme:'', courseId:-1, classPeriod:'' };
    if (s.customGoals === undefined) s.customGoals = '';
    if (s.meta.className && !s.meta.courseTheme) {
      var found = false;
      for (var theme in COURSES) {
        if (!COURSES.hasOwnProperty(theme)) continue;
        var idx = COURSES[theme].findIndex(function(c) { return c.name === s.meta.className; });
        if (idx >= 0) { s.meta.courseTheme = theme; s.meta.courseId = idx; found = true; break; }
      }
      if (!found) { s.meta.courseTheme = ''; s.meta.courseId = -1; }
      delete s.meta.className;
    }
    if (!s.students) s.students = [];
    s.students.forEach(function(st) {
      if (!st.stars) st.stars = {搭建:0,编程:0,总评:0};
      if (!st.tags) st.tags = [];
      if (!st.note) st.note = '';
      if (!st.status) st.status = '';
      if (!st.checks) st.checks = {};
    });
  });
}

// ================================================================
// 8. 云端同步
// ================================================================
function scheduleCloudSave() {
  if (!currentUser) return;
  if (cloudTimer) clearTimeout(cloudTimer);
  cloudSavePending = true;
  document.getElementById('cloudStatus').textContent = '☁️ 待同步';
  cloudTimer = setTimeout(uploadToCloud, C.CLOUD_MS);
}

async function uploadToCloud() {
  if (!currentUser) return;
  cloudSavePending = false;
  try {
    await db.collection('users').doc(currentUser.uid).set({
      data: JSON.stringify({ sessions: sessions, currentId: currentId }),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('cloudStatus').textContent = '☁️ 已同步';
  } catch(e) {
    console.warn('☁️ 云端同步失败:', e);
    document.getElementById('cloudStatus').textContent = '⚠️ 同步失败';
    showToast('云端同步失败，数据已保存到本地', 'warning', 4000);
  }
}

function loadData() {
  var localLoaded = loadFromLocal();

  if (!currentUser) {
    if (!localLoaded) {
      var s = makeSession();
      sessions = [s]; currentId = s.id;
      saveData();
    }
    renderAll();
    return;
  }

  cloudLoaded = false;
  document.getElementById('cloudStatus').textContent = '☁️ 加载中…';
  loadFromCloud();
}

async function loadFromCloud() {
  if (!currentUser) return;
  try {
    var doc = await db.collection('users').doc(currentUser.uid).get();
    if (doc.exists) {
      var raw = doc.data().data;
      if (raw) {
        var data = JSON.parse(raw);
        if (data.sessions && data.sessions.length > 0) {
          sessions = data.sessions;
          currentId = data.currentId || sessions[0].id;
          migrateSessions(sessions);
          try { localStorage.setItem(C.SAVE_KEY, JSON.stringify({ sessions: sessions, currentId: currentId })); } catch(e) {}
          console.log('☁️ 云端数据已加载');
        }
      }
    } else {
      console.log('☁️ 云端无数据，上传本地数据');
      await uploadToCloud();
    }
  } catch(e) {
    console.warn('☁️ 云端加载失败，使用本地数据:', e);
  }
  renderAll();
  scheduleCloudSave();
}

// ================================================================
// 9. 标签栏
// ================================================================
function renderTabs() {
  var bar = document.getElementById('tabBar');
  bar.innerHTML = sessions.map(function(s) {
    var courseName = '';
    if (s.meta.courseTheme && s.meta.courseId >= 0) {
      var c = COURSES[s.meta.courseTheme];
      if (c && c[s.meta.courseId]) courseName = c[s.meta.courseId].name;
    }
    var label = escapeHtml(courseName || s.meta.classPeriod || '未命名课堂');
    var date = s.meta.classDate ? escapeHtml(s.meta.classDate.slice(5)) : '';
    var active = s.id === currentId ? 'active' : '';
    var studentCount = s.students.length;
    return '<button class="tab ' + active + '" onclick="switchSession(\'' + escapeHtml(s.id) + '\')" role="tab" aria-selected="' + (active ? 'true' : 'false') + '">' +
      (date ? date + ' ' : '') + label + (studentCount ? ' (' + studentCount + '人)' : '') +
      '<span class="close" onclick="event.stopPropagation();deleteSession(\'' + escapeHtml(s.id) + '\')" role="button" aria-label="删除课堂" tabindex="0">✕</span>' +
    '</button>';
  }).join('');
  bar.innerHTML += '<button class="tab-add" onclick="addSession()" aria-label="新建课堂">➕ 新课</button>';
}

window.switchSession = function(id) {
  currentId = id;
  renderTabs();
  renderHeader();
  renderStudents();
  updateGoalsDisplay();
};

window.addSession = function() {
  var s = makeSession();
  sessions.push(s);
  currentId = s.id;
  renderTabs();
  renderHeader();
  renderStudents();
  updateGoalsDisplay();
  saveData();
  showToast('已创建新课堂', 'success');
};

window.deleteSession = function(id) {
  if (sessions.length <= 1) {
    alert('至少保留一个课堂，如果要全部清空请点「清空学生」');
    return;
  }
  var s = sessions.find(function(x) { return x.id === id; });
  var delLabel = s.meta.classPeriod || '未命名课堂';
  if (s.meta.courseTheme && s.meta.courseId >= 0) {
    var courses = COURSES[s.meta.courseTheme];
    if (courses && courses[s.meta.courseId]) delLabel = courses[s.meta.courseId].name;
  }
  if (!confirm('确定删除「' + delLabel + '」及其所有学生数据吗？')) return;
  undoStack.push({
    label: '删除课堂「' + delLabel + '」',
    type: 'session',
    session: JSON.parse(JSON.stringify(s)),
    sessionId: id
  });
  if (undoStack.length > C.MAX_UNDO) undoStack.shift();
  persistUndo();
  var btn = document.getElementById('undoBtn');
  if (btn) btn.style.display = '';
  sessions = sessions.filter(function(x) { return x.id !== id; });
  if (currentId === id) currentId = sessions[0].id;
  renderTabs();
  renderHeader();
  renderStudents();
  saveData();
};

// ================================================================
// 10. 表头 & 课程选择
// ================================================================
function renderHeader() {
  var s = curSession();
  if (!s) return;
  document.getElementById('classDate').value = s.meta.classDate || '';
  document.getElementById('classPeriod').value = s.meta.classPeriod || '';
  var themeSel = document.getElementById('themeSelect');
  themeSel.value = s.meta.courseTheme || '';
  updateCourseList();
  document.getElementById('courseSelect').value = s.meta.courseId != null ? s.meta.courseId : '';
  updateGoalsDisplay();
}

window.onMetaChange = function() {
  var s = curSession();
  if (!s) return;
  s.meta.classDate = document.getElementById('classDate').value;
  s.meta.courseTheme = document.getElementById('themeSelect').value;
  var idx = parseInt(document.getElementById('courseSelect').value);
  s.meta.courseId = isNaN(idx) ? -1 : idx;
  s.meta.classPeriod = document.getElementById('classPeriod').value;
  renderTabs();
  debounceSave();
};

window.onThemeChange = function() {
  updateCourseList();
  document.getElementById('courseSelect').value = '';
  updateGoalsDisplay();
  onMetaChange();
};

function updateCourseList() {
  var theme = document.getElementById('themeSelect').value;
  var sel = document.getElementById('courseSelect');
  var courses = COURSES[theme] || [];
  sel.innerHTML = '<option value="">' + (courses.length ? '请选择课程' : '暂无课程') + '</option>';
  courses.forEach(function(c, i) {
    sel.innerHTML += '<option value="' + i + '">' + escapeHtml(c.name) + '</option>';
  });
}

function parseBatchNames(raw) {
  if (!raw || !raw.trim()) return [];
  return raw.split(/\n/).reduce(function(acc, line) {
    return acc.concat(line.split(/[,，、\s]+/).map(function(n) { return n.trim(); }).filter(Boolean));
  }, []);
}

window.toggleCheck = function(el, idx, key) {
  var st = curStudents();
  if (!st[idx]) return;

  debounceSave();
};

window.toggleTag = function(el, idx, text) {
  var st = curStudents();
  if (!st[idx]) return;
  var arr = st[idx].tags;
  var label = text.replace(/^[^a-zA-Z\u4e00-\u9fff]+/, '').replace(/\s+/g, '');
  var prefix = label + '：';

  if (arr.indexOf(text) >= 0) {
    arr.splice(arr.indexOf(text), 1);
    el.classList.remove('on');
    st[idx].note = st[idx].note
      .split('\n')
      .filter(function(line) { return line.indexOf(prefix) !== 0; })
      .join('\n')
      .replace(/^\n+|\n+$/g, '');
  } else {
    arr.push(text);
    el.classList.add('on');
    var note = st[idx].note || '';
    if (note.indexOf(prefix) === -1) {
      st[idx].note = note ? note + '\n' + prefix : prefix;
    }
  }

  var card = el.closest('.card');
  if (card) {
    var ta = card.querySelector('textarea');
    if (ta) {
      ta.value = st[idx].note;
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }
  }
  debounceSave();
};

function getFilteredAndSorted() {
  var sts = curStudents();
  if (!sts || !sts.length) return [];

  var filtered = sts;
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    filtered = sts.filter(function(s) { return s.name.toLowerCase().indexOf(q) !== -1; });
  }

  var sorted = filtered.slice();
  switch (sortBy) {
    case 'name-asc':
      sorted.sort(function(a, b) { return a.name.localeCompare(b.name, 'zh'); });
      break;
    case 'name-desc':
      sorted.sort(function(a, b) { return b.name.localeCompare(a.name, 'zh'); });
      break;
    case 'status':
      var order = {}; order[C.STATUS.ISSUE] = 0; order[C.STATUS.MID] = 1; order[C.STATUS.GOOD] = 2; order[''] = 3;
      sorted.sort(function(a, b) { return (order[a.status] != null ? order[a.status] : 3) - (order[b.status] != null ? order[b.status] : 3); });
      break;
    case 'rating':
      sorted.sort(function(a, b) {
        var totalB = (b.stars['搭建']||0) + (b.stars['编程']||0) + (b.stars['总评']||0);
        var totalA = (a.stars['搭建']||0) + (a.stars['编程']||0) + (a.stars['总评']||0);
        return totalB - totalA;
      });
      break;
  }
  return sorted;
}

var voiceRecognition = null;
var voiceTargetIdx = -1;
var voiceTargetEl = null;
var voiceIsRecording = false;
var voiceRetryCount = 0;
var VoiceSupported = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

window.startVoiceInput = function(btn, idx) {
  if (voiceIsRecording && voiceTargetIdx === idx) {
    stopVoiceInput();
    return;
  }

  if (voiceIsRecording) {
    stopVoiceInput();
  }

  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    if (location.protocol === 'file:') {
      alert('⚠️ 本地文件不支持语音识别！\n\n解决办法：\n1️⃣ 用 GitHub Pages 打开：\n   https://920983424-ops.github.io/lego-class-tool/\n\n2️⃣ 或者安装 Live Server（VS Code 插件）打开');
    } else {
      alert('⚠️ 您的浏览器不支持语音输入，请使用 Chrome 或 Edge 浏览器');
    }
    return;
  }

  voiceRecognition = new SpeechRecognition();
  voiceRecognition.lang = 'zh-CN';
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = true;
  voiceRecognition.maxAlternatives = 1;

  voiceTargetIdx = idx;
  voiceTargetEl = btn;
  voiceIsRecording = true;
  voiceRetryCount = 0;

  btn.classList.add('recording');
  btn.textContent = '⏹';
  btn.title = '点击停止录音';
  btn.setAttribute('aria-label', '停止录音');

  var card = btn.closest('.card');
  var hint = card ? card.querySelector('.voice-hint') : document.getElementById('goalsVoiceHint');
  if (hint) hint.classList.add('show');

  voiceRecognition.onresult = function(event) {
    var finalText = '';
    for (var i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalText += event.results[i][0].transcript;
      }
    }
    if (!finalText) return;

    if (idx >= 0) {
      var st = curStudents();
      if (st && st[idx]) {
        st[idx].note = (st[idx].note || '') + finalText;
      }
      var ta = btn.closest('.card') ? btn.closest('.card').querySelector('textarea') : null;
      if (ta) {
        var st2 = curStudents();
        ta.value = st2 && st2[idx] ? st2[idx].note : '';
      }
    } else {
      var ta2 = document.getElementById('goalsInput');
      if (ta2) {
        ta2.value = ta2.value + (ta2.value ? '\n' : '') + finalText;
        if (curSession()) curSession().customGoals = ta2.value;
      }
    }
    debounceSave();
  };

  voiceRecognition.onerror = function(event) {
    console.warn('语音识别错误:', event.error);
    if (event.error === 'not-allowed') {
      if (location.protocol === 'file:') {
        alert('⚠️ 麦克风被拒绝！\n\n本地文件（file://）Chrome 不允许使用麦克风。\n\n✅ 请改用这个网址打开：\nhttps://920983424-ops.github.io/lego-class-tool/');
      } else {
        alert('⚠️ 麦克风权限被拒绝，请在浏览器设置中允许麦克风访问');
      }
    }
    stopVoiceInput();
  };

  voiceRecognition.onend = function() {
    if (voiceIsRecording && voiceTargetIdx === idx && voiceRetryCount < C.MAX_VOICE_RETRIES) {
      voiceRetryCount++;
      try {
        voiceRecognition.start();
      } catch(e) {
        stopVoiceInput();
      }
    } else {
      if (voiceRetryCount >= C.MAX_VOICE_RETRIES) {
        console.warn('语音识别达到最大重试次数，自动停止');
      }
      stopVoiceInput();
    }
  };

  try {
    voiceRecognition.start();
  } catch(e) {
    stopVoiceInput();
  }
};

function stopVoiceInput() {
  voiceIsRecording = false;
  if (voiceRecognition) {
    try { voiceRecognition.stop(); } catch(e) {}
    voiceRecognition = null;
  }

  document.querySelectorAll('.mic-btn').forEach(function(b) {
    b.classList.remove('recording');
    b.textContent = '🎤';
    b.title = '语音输入';
    b.setAttribute('aria-label', '语音输入');
  });

  document.querySelectorAll('.voice-hint').forEach(function(h) { h.classList.remove('show'); });

  voiceTargetIdx = -1;
  voiceTargetEl = null;
}

window.exportJSON = function() {

window.importJSON = function(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!data.sessions || !Array.isArray(data.sessions)) {
        alert('❌ 无效的备份文件'); return;
      }
      if (sessions.length > 0 && !confirm('导入备份将替换当前所有数据，确定吗？')) return;
      sessions = data.sessions;
      currentId = data.currentId || sessions[0].id;
      sessions.forEach(function(s) {
        if (!s.id) s.id = Date.now() + '_' + Math.random().toString(36).slice(2,6);
        if (!s.meta) s.meta = { classDate:'', courseTheme:'', courseId:-1, classPeriod:'' };
        if (s.meta.className && !s.meta.courseTheme) {
          var found = false;
          for (var theme in COURSES) {
            if (!COURSES.hasOwnProperty(theme)) continue;
            var idx = COURSES[theme].findIndex(function(c) { return c.name === s.meta.className; });
            if (idx >= 0) { s.meta.courseTheme = theme; s.meta.courseId = idx; found = true; break; }
          }
          if (!found) { s.meta.courseTheme = ''; s.meta.courseId = -1; }
          delete s.meta.className;
        }
        if (!s.students) s.students = [];
        s.students.forEach(function(st) {
          if (!st.stars) st.stars = {搭建:0,编程:0,总评:0};
          if (!st.tags) st.tags = [];
          if (!st.note) st.note = '';
          if (!st.status) st.status = '';
          if (!st.checks) st.checks = {};
        });
      });
      renderAll();
      saveData();
      showToast('✅ 备份恢复成功！', 'success');
    } catch(err) {
      alert('❌ 备份解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
};

function renderStudents() {
  var list = document.getElementById('list');
  var noResults = document.getElementById('noResults');
  var sts = getFilteredAndSorted();

  if (!curStudents() || curStudents().length === 0) {
    list.innerHTML = '<div class="empty-tip">👆 点击「➕ 加学生」添加本节课的学生</div>';
    if (noResults) noResults.style.display = 'none';
    return;
  }

  if (sts.length === 0 && curStudents().length > 0) {
    list.innerHTML = '';
    if (noResults) noResults.style.display = 'block';
    return;
  }

  if (noResults) noResults.style.display = 'none';

  list.innerHTML = sts.map(function(s, idx) {
    // 找到原始索引（用于数据操作）
    var origIdx = curStudents().indexOf(s);

    // 勾选框
    var chkHTML = CHECK_ITEMS.map(function(g) {
      var items = g.items.map(function(item) {
        var key = g.title + '|' + item;
        var checked = s.checks[key] ? 'checked' : '';
        return '<label><input type="checkbox" onchange="toggleCheck(this,' + origIdx + ',\'' + key.replace(/'/g, "\\'") + '\')" ' + checked + ' aria-label="' + escapeHtml(item) + '"><span>' + escapeHtml(item) + '</span></label>';
      }).join('');
      return '<div class="sec-title">' + escapeHtml(g.title) + '</div><div class="chk-group">' + items + '</div>';
    }).join('');

    // 星星
    var starHTML = '';
    C.STAR_CATS.forEach(function(cat) {
      var val = s.stars[cat] || 0;
      var btns = '';
      for (var i = 1; i <= 5; i++) {
        btns += '<button type="button" class="star-btn ' + (i <= val ? 'on' : '') + '" onclick="toggleStar(this,' + origIdx + ',\'' + cat + '\',' + i + ')" aria-label="' + cat + ' ' + i + '星">★</button>';
      }
      starHTML += '<div class="star-row"><span class="label">' + cat + '</span>' + btns + '</div>';
    });

    // 标签
    var tagHTML = TAG_LIST.map(function(t) {
      var on = s.tags.indexOf(t.text) >= 0 ? 'on' : '';
      return '<button type="button" class="tag-btn ' + t.cls + ' ' + on + '" onclick="toggleTag(this,' + origIdx + ',\'' + t.text.replace(/'/g, "\\'") + '\')" aria-pressed="' + (on ? 'true' : 'false') + '">' + escapeHtml(t.text) + '</button>';
    }).join('');

    // 状态下拉
    var selOpts = C.STATUS_OPTS.map(function(v) {
      return '<option value="' + v + '" ' + (s.status === v ? 'selected' : '') + '>' + C.STATUS_LABEL[v] + '</option>';
    }).join('');

    return '<div class="card ' + s.status + '" data-student="' + escapeHtml(s.name) + '">' +
      '<div class="card-top">' +
        '<span class="name" onclick="renameStudent(' + origIdx + ')" title="点击改名" role="button" tabindex="0">' + escapeHtml(s.name) + '</span>' +
        '<select onchange="updateStatus(this,' + origIdx + ')" style="font-size:12px;padding:2px 5px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text)" aria-label="学生状态">' + selOpts + '</select>' +
        '<button class="del" onclick="removeStudent(' + origIdx + ')" title="删除" aria-label="删除 ' + escapeHtml(s.name) + '">✕</button>' +
      '</div>' +
      chkHTML +
      '<div class="sec-title" style="margin-top:8px">⭐ 评分</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px">' + starHTML + '</div>' +
      '<div class="sec-title">📌 快速标记</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">' + tagHTML + '</div>' +
      '<div class="note-wrap">' +
        '<textarea placeholder="亮点 / 待改进 / 备注…" oninput="updateNote(this,' + origIdx + ')" aria-label="备注">' + escapeHtml(s.note) + '</textarea>' +
        '<button type="button" class="mic-btn" onclick="startVoiceInput(this,' + origIdx + ')" title="语音输入" aria-label="语音输入备注">🎤</button>' +
      '</div>' +
      '<div class="voice-hint">🎤 录音中… 说话自动转文字</div>' +
    '</div>';
  }).join('');
}

function renderAll() {
  renderTabs();
  renderHeader();
  renderStudents();
}

// ================================================================
// 17. 认证系统
// ================================================================
window.showLoginModal = function() {
  var old = document.querySelector('.modal-overlay');
  if (old) old.remove();

  var div = document.createElement('div');
  div.className = 'modal-overlay';
  div.id = 'loginModal';
  div.setAttribute('role', 'dialog');
  div.setAttribute('aria-label', '登录');
  div.innerHTML =
    '<div class="modal-box" onclick="event.stopPropagation()">' +
      '<button class="close-btn" onclick="closeLoginModal()" aria-label="关闭">×</button>' +
      '<h3>🔑 登录课堂记录表</h3>' +
      '<div class="desc">登录后数据自动同步到云端，换设备也能用</div>' +
      '<button class="btn-block btn-google" onclick="handleGoogleLogin()">🌐 使用 Google 账号登录</button>' +
      '<div class="divider"><span>或</span></div>' +
      '<div id="emailLoginForm">' +
        '<input type="email" id="loginEmail" placeholder="邮箱地址（QQ/163/Google 等）" autocomplete="email" aria-label="邮箱">' +
        '<input type="password" id="loginPassword" placeholder="密码（至少6位）" autocomplete="current-password" aria-label="密码">' +
        '<div class="row">' +
          '<button class="btn-block btn-email" onclick="handleEmailLogin()">📧 登录</button>' +
          '<button class="btn-block btn-email" onclick="handleEmailRegister()" style="background:var(--success)">✨ 注册</button>' +
        '</div>' +
        '<div id="loginError" style="color:var(--danger);font-size:13px;margin-top:6px;display:none"></div>' +
      '</div>' +
    '</div>';
  document.body.appendChild(div);

  div.querySelector('#loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleEmailLogin();
  });
};

window.closeLoginModal = function() {
  var el = document.getElementById('loginModal');
  if (el) el.remove();
};

function showLoginError(msg) {
  var el = document.getElementById('loginError');
  if (el) { el.textContent = msg; el.style.display = ''; }
}

window.handleGoogleLogin = function() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e) {
    showLoginError('Google 登录失败：' + e.message);
  });
};

window.handleEmailLogin = function() {
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPassword').value;
  if (!email) { showLoginError('请输入邮箱'); return; }
  if (!pass) { showLoginError('请输入密码'); return; }
  showLoginError('登录中…');
  auth.signInWithEmailAndPassword(email, pass).catch(function(e) {
    if (e.code === 'auth/user-not-found') {
      showLoginError('该邮箱未注册，请先点击「注册」创建账号');
    } else if (e.code === 'auth/wrong-password') {
      showLoginError('密码错误');
    } else if (e.code === 'auth/invalid-email') {
      showLoginError('邮箱格式不正确');
    } else if (e.code === 'auth/invalid-credential') {
      showLoginError('邮箱或密码错误');
    } else {
      showLoginError('登录失败：' + e.message);
    }
  });
};

window.handleEmailRegister = function() {
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPassword').value;
  if (!email) { showLoginError('请输入邮箱'); return; }
  if (!pass) { showLoginError('请输入密码'); return; }
  if (pass.length < 6) { showLoginError('密码至少 6 位'); return; }
  showLoginError('注册中…');
  var registerTimedOut = false;
  var registerTimer = setTimeout(function() {
    registerTimedOut = true;
    showLoginError('注册超时，请检查网络或刷新重试。可能是 App Check 域名未授权，按 F12 查看控制台');
  }, 15000);
  auth.createUserWithEmailAndPassword(email, pass).then(function(result) {
    if (registerTimedOut) return;
    clearTimeout(registerTimer);
    result.user.sendEmailVerification().catch(function(e) {
      console.warn('发送验证邮件失败:', e);
    });
    closeLoginModal();
    showLoginError('');
  }).catch(function(e) {
    clearTimeout(registerTimer);
    if (registerTimedOut) return;
    if (e.code === 'auth/email-already-in-use') {
      showLoginError('该邮箱已注册，请直接登录');
    } else {
      showLoginError('注册失败：' + e.message);
    }
  });
};

// 邮箱验证弹窗
window.showVerifyModal = function(user) {
  var old = document.querySelector('.verify-modal-overlay');
  if (old) old.remove();

  var email = user.email || '';
  var div = document.createElement('div');
  div.className = 'verify-modal-overlay';
  div.id = 'verifyModal';
  div.setAttribute('role', 'dialog');
  div.setAttribute('aria-label', '验证邮箱');
  div.innerHTML =
    '<div class="modal-box" onclick="event.stopPropagation()">' +
      '<h3>📧 验证邮箱</h3>' +
      '<div class="desc">' +
        '已发送验证邮件到 <strong>' + escapeHtml(email) + '</strong>，请前往邮箱点击验证链接。' +
        '<br><br>' +
        '📨 没收到？先检查<b>垃圾邮件箱</b>。' +
        '<br>还是没收到，点击下方重新发送。' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px">' +
        '<button class="btn-block btn-email" onclick="resendVerifyEmail()">🔄 重新发送验证邮件</button>' +
        '<button class="btn-block btn-email" onclick="checkEmailVerified()" style="background:var(--success)">✅ 我已验证，进入</button>' +
        '<button class="btn-block" onclick="skipVerify()" style="background:var(--surface-hover);color:var(--text-secondary)">⏭ 稍后验证，先用本地模式</button>' +
        '<button class="btn-block" onclick="handleLogout()" style="background:var(--text-muted);color:#fff">← 换个账号</button>' +
      '</div>' +
      '<div id="verifyStatus" style="color:var(--text-muted);font-size:13px;margin-top:8px;text-align:center"></div>' +
    '</div>';
  document.body.appendChild(div);
};

window.resendVerifyEmail = function() {
  var st = document.getElementById('verifyStatus');
  if (st) st.textContent = '📨 发送中…';
  if (auth.currentUser) {
    auth.currentUser.sendEmailVerification().then(function() {
      if (st) st.textContent = '✅ 验证邮件已发送，请查收';
    }).catch(function(e) {
      if (st) st.textContent = '❌ 发送失败：' + e.message;
    });
  }
};

window.checkEmailVerified = function() {
  var st = document.getElementById('verifyStatus');
  if (st) st.textContent = '⏳ 检查中…';
  if (auth.currentUser) {
    auth.currentUser.reload().then(function() {
      if (auth.currentUser.emailVerified) {
        var el = document.getElementById('verifyModal');
        if (el) el.remove();
        afterLogin(auth.currentUser);
      } else {
        if (st) st.textContent = '❌ 还没验证，再检查一下邮箱吧';
      }
    }).catch(function(e) {
      if (st) st.textContent = '❌ 检查失败：' + e.message;
    });
  }
};

window.skipVerify = function() {
  var el = document.getElementById('verifyModal');
  if (el) el.remove();
  var cloudStatus = document.getElementById('cloudStatus');
  if (cloudStatus) cloudStatus.textContent = '⚠️ 邮箱未验证，仅本地模式';
  var loginBtn = document.getElementById('loginBtn');
  var userInfo = document.getElementById('userInfo');
  var userName = document.getElementById('userName');
  if (loginBtn) loginBtn.style.display = 'none';
  if (userInfo) userInfo.style.display = '';
  if (userName) userName.textContent = (auth.currentUser && auth.currentUser.email) || '用户';
};

window.handleLogout = function() {
  if (!confirm('确定退出登录？退出后本地数据还在，但不会自动同步到云端')) return;
  if (cloudTimer) { clearTimeout(cloudTimer); cloudTimer = null; }
  cloudSavePending = false;
  auth.signOut();
};

function afterLogin(user) {
  var loginBtn = document.getElementById('loginBtn');
  var userInfo = document.getElementById('userInfo');
  var userName = document.getElementById('userName');
  var cloudStatus = document.getElementById('cloudStatus');
  loginBtn.style.display = 'none';
  userInfo.style.display = '';
  userName.textContent = user.displayName || user.email || '用户';
  cloudStatus.textContent = '☁️ 加载中…';
  loadFromCloud();
}

// ================================================================
// 18. 认证状态监听 & 启动
// ================================================================
auth.onAuthStateChanged(function(user) {
  var loginBtn = document.getElementById('loginBtn');
  var userInfo = document.getElementById('userInfo');
  var userName = document.getElementById('userName');
  var cloudStatus = document.getElementById('cloudStatus');

  if (user) {
    currentUser = user;
    closeLoginModal();

    if (!user.emailVerified) {
      loginBtn.style.display = 'none';
      showVerifyModal(user);
      return;
    }

    afterLogin(user);
  } else {
    currentUser = null;
    loginBtn.style.display = '';
    userInfo.style.display = 'none';
    cloudStatus.textContent = '💻 本地模式';

    if (initialAuthChecked) {
      if (!loadFromLocal()) {
        var s = makeSession();
        sessions = [s]; currentId = s.id;
        saveData();
      }
      renderAll();
    }
    initialAuthChecked = true;
  }
});

// ======== 启动 ========
initTheme();
// 恢复排序偏好
sortBy = localStorage.getItem(C.SORT_KEY) || 'default';
var sortEl = document.getElementById('sortSelect');
if (sortEl) sortEl.value = sortBy;

if (!loadFromLocal()) {
  var s = makeSession();
  sessions = [s]; currentId = s.id;
}
renderAll();
</script>
</body>
